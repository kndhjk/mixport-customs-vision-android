name: Android APK

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Lint, test, and build APKs
        run: ./gradlew lintPublicDebug testPublicDebugUnitTest assemblePublicDebug assemblePublicRelease assembleFieldDebug assembleFieldRelease

      - name: Prepare artifacts
        shell: bash
        run: |
          set -euo pipefail
          VERSION_NAME="${GITHUB_REF_NAME}"
          if [[ "${GITHUB_REF}" != refs/tags/* ]]; then
            VERSION_NAME="main-${GITHUB_RUN_NUMBER}"
          fi
          mkdir -p dist
          shopt -s nullglob
          APKS=(app/build/outputs/apk/public/debug/*.apk app/build/outputs/apk/public/release/*.apk)
          if [[ ${#APKS[@]} -eq 0 ]]; then
            echo "No APK artifacts were produced."
            exit 1
          fi
          for apk in "${APKS[@]}"; do
            base_name="$(basename "${apk}")"
            cp "${apk}" "dist/${base_name%.apk}-${VERSION_NAME}.apk"
          done

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mixport-customs-vision-apks
          path: dist/*.apk

      - name: Submit dependency graph
        if: github.event_name == 'push'
        continue-on-error: true
        uses: gradle/actions/dependency-submission@v4

      - name: Publish tagged release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.apk
          generate_release_notes: true
          body: |
            Pilot Android APKs for Mixport Customs Vision.

            Notes:
            - Only the hardened `public` APK variants are attached to GitHub releases.
            - `public-debug.apk` remains the fallback installable artifact for lab and validation.
            - `public-release.apk` is signed only when release-keystore secrets are configured; otherwise GitHub produces an unsigned release artifact for controlled signing.
            - The `field` variants continue to build in CI for regression coverage, but they are not published as public GitHub artifacts.
